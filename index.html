<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Lista del Súper</title>
<meta name="theme-color" content="#1B3A2F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-apple-touch.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Súper">

<!-- ===================== CONFIGURACIÓN ===================== -->
<!-- Completá estos dos valores siguiendo el README.md antes de usar la app -->
<script>
  window.APP_CONFIG = {
    CLIENT_ID: "746f62ec-3d96-4603-8b89-2284ed4e9321",   // Application (client) ID de tu app registrada en Entra
    FOLDER_NAME: "ListaSuperFamiliar",     // nombre de la carpeta en OneDrive donde vive el archivo
    FILE_NAME: "lista.json",
    VERSION: "2.2",
    RELEASE_DATE: "06/07/2026"
  };
</script>
<!-- =========================================================== -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@azure/msal-browser@3/lib/msal-browser.min.js"></script>

<style>
  :root{
    --board:#1B3A2F;
    --board-2:#173025;
    --chalk:#F4EFE1;
    --chalk-dim:rgba(244,239,225,0.55);
    --line:rgba(244,239,225,0.16);
    --accent:#F2B705;
    --tomato:#E2543D;
    --card:#20443685;
    --radius:16px;
    --safe-top:env(safe-area-inset-top);
    --safe-bottom:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 50% -10%, #24503f 0%, var(--board) 55%),
      var(--board);
    color:var(--chalk);
    font-family:'Work Sans', sans-serif;
    overscroll-behavior-y:none;
  }
  /* textura sutil tipo pizarra */
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:radial-gradient(rgba(244,239,225,0.035) 1px, transparent 1px);
    background-size:3px 3px;
    pointer-events:none;
    z-index:0;
  }
  #app{
    position:relative; z-index:1;
    max-width:560px; margin:0 auto;
    min-height:100vh;
    display:flex; flex-direction:column;
  }
  h1,h2,h3{font-family:'Fraunces', serif; font-weight:700; margin:0;}

  /* ---------- HEADER ---------- */
  header{
    padding:calc(20px + var(--safe-top)) 20px 14px;
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
  }
  header .brand{display:flex; flex-direction:column; gap:2px;}
  header .brand h1{font-size:26px; letter-spacing:0.2px;}
  header .brand .sub{font-size:12px; color:var(--chalk-dim); font-family:'IBM Plex Mono', monospace; text-transform:uppercase; letter-spacing:0.08em;}
  header .brand .version{font-size:10px; color:rgba(244,239,225,0.4); font-family:'IBM Plex Mono', monospace; letter-spacing:0.04em;}
  .who{
    display:flex; align-items:center; gap:8px;
    font-size:13px; color:var(--chalk-dim);
  }
  .avatar{
    width:30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces', serif; font-weight:700; font-size:13px;
    color:#1B3A2F;
    flex-shrink:0;
  }
  .avatar.owner{background:var(--accent);}
  .avatar.guest{background:#8FCB9B;}
  button.icon-btn{
    background:transparent; border:1px solid var(--line); color:var(--chalk-dim);
    width:34px; height:34px; border-radius:50%; font-size:15px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }

  /* ---------- SYNC STRIP ---------- */
  .sync-strip{
    margin:0 20px 10px; padding:8px 12px;
    border-radius:10px; font-size:12px;
    display:flex; align-items:center; gap:8px;
    font-family:'IBM Plex Mono', monospace;
    color:var(--chalk-dim);
    border:1px dashed var(--line);
  }
  .dot{width:7px; height:7px; border-radius:50%; background:#8FCB9B; flex-shrink:0;}
  .dot.syncing{background:var(--accent); animation:pulse 1s infinite;}
  .dot.error{background:var(--tomato);}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:0.35;}}

  /* ---------- GATE (login / setup) ---------- */
  .gate{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:32px 28px; gap:18px;
  }
  .gate .mark{font-size:44px;}
  .gate h2{font-size:24px; max-width:320px; line-height:1.25;}
  .gate p{color:var(--chalk-dim); font-size:14px; max-width:300px; line-height:1.5;}
  .btn{
    font-family:'Work Sans',sans-serif; font-weight:600; font-size:15px;
    padding:13px 24px; border-radius:999px; border:none; cursor:pointer;
    display:inline-flex; align-items:center; gap:8px;
  }
  .btn-primary{background:var(--accent); color:#1B3A2F;}
  .btn-ghost{background:transparent; color:var(--chalk); border:1px solid var(--line);}
  .btn-danger{background:transparent; color:var(--tomato); border:1px solid rgba(226,84,61,0.4);}
  .btn:active{transform:scale(0.97);}
  .btn[disabled]{opacity:0.5; pointer-events:none;}

  .setup-card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:20px; text-align:left; max-width:340px; width:100%;
  }
  .setup-card label{font-size:12px; color:var(--chalk-dim); font-family:'IBM Plex Mono', monospace; text-transform:uppercase; letter-spacing:0.06em;}
  .setup-card input{
    width:100%; margin-top:6px; margin-bottom:14px;
    background:rgba(0,0,0,0.2); border:1px solid var(--line); color:var(--chalk);
    padding:11px 12px; border-radius:10px; font-size:15px; font-family:'Work Sans',sans-serif;
  }
  .setup-card input::placeholder{color:rgba(244,239,225,0.35);}

  /* ---------- LIST AREA ---------- */
  main{flex:1; padding:0 20px 12px; overflow-y:auto;}
  .cat-group{margin-bottom:18px;}
  .cat-title{
    font-family:'IBM Plex Mono', monospace; font-size:11px; text-transform:uppercase;
    letter-spacing:0.1em; color:var(--accent); margin:0 0 8px 2px;
    display:flex; align-items:center; gap:8px;
  }
  .cat-title::after{content:""; flex:1; height:1px; background:var(--line);}

  .item-row{
    display:flex; align-items:center; gap:12px;
    padding:12px 4px; border-bottom:1px dotted var(--line);
    animation:fadein 0.2s ease;
  }
  @keyframes fadein{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}
  .check{
    width:26px; height:26px; border-radius:8px; flex-shrink:0;
    border:1.5px solid var(--chalk-dim); display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:15px; color:transparent;
    transition:all 0.15s;
  }
  .check.checked{background:var(--accent); border-color:var(--accent); color:#1B3A2F;}
  .item-info{flex:1; min-width:0; cursor:pointer;}
  .item-name{font-size:16px; font-weight:500;}
  .item-meta{font-size:11px; color:var(--chalk-dim); font-family:'IBM Plex Mono', monospace; margin-top:2px;}
  .item-del{
    background:none; border:none; color:var(--chalk-dim); font-size:18px; padding:6px; cursor:pointer; flex-shrink:0;
  }
  .item-cat-btn{
    flex-shrink:0; padding:5px 10px; border-radius:999px; font-size:11px;
    border:1px solid var(--line); color:var(--chalk-dim); background:rgba(0,0,0,0.15);
    font-family:'IBM Plex Mono', monospace; cursor:pointer; white-space:nowrap;
  }

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--chalk-dim);
  }
  .empty-state .mark{font-size:34px; display:block; margin-bottom:10px;}

  .done-section{margin-top:6px;}
  .done-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 4px; cursor:pointer;
  }
  .done-header .cat-title{margin:0;}
  .clear-btn{font-size:11px; color:var(--tomato); font-family:'IBM Plex Mono',monospace; background:none; border:none; cursor:pointer; text-transform:uppercase;}

  /* ---------- TABS (Para comprar / En casa) ---------- */
  .tabs-row{
    display:flex; gap:8px; margin:0 20px 14px;
  }
  .tab-btn{
    flex:1; padding:11px 10px; border-radius:12px; text-align:center;
    border:1px solid var(--line); background:rgba(0,0,0,0.15); color:var(--chalk-dim);
    font-family:'Work Sans',sans-serif; font-weight:600; font-size:14px; cursor:pointer;
  }
  .tab-btn.active{background:var(--accent); color:#1B3A2F; border-color:var(--accent);}

  /* ---------- ADD BAR (fijo abajo, alcance del pulgar) ---------- */
  .addbar{
    position:sticky; bottom:0; z-index:2;
    padding:10px 16px calc(14px + var(--safe-bottom));
    background:linear-gradient(180deg, transparent, var(--board) 30%);
  }
  .cats-row{
    display:flex; gap:6px; overflow-x:auto; padding:0 2px 8px; scrollbar-width:none;
  }
  .cats-row::-webkit-scrollbar{display:none;}
  .cat-chip{
    flex-shrink:0; padding:6px 12px; border-radius:999px; font-size:12px;
    border:1px solid var(--line); color:var(--chalk-dim); background:rgba(0,0,0,0.15);
    font-family:'IBM Plex Mono', monospace; cursor:pointer; white-space:nowrap;
  }
  .cat-chip.active{background:var(--accent); color:#1B3A2F; border-color:var(--accent); font-weight:600;}
  .add-row{display:flex; gap:8px; align-items:center;}
  .add-row input{
    flex:1; background:rgba(0,0,0,0.25); border:1px solid var(--line); color:var(--chalk);
    padding:14px 16px; border-radius:999px; font-size:16px; font-family:'Work Sans',sans-serif;
  }
  .add-row input::placeholder{color:rgba(244,239,225,0.35);}
  .add-row button{
    width:48px; height:48px; border-radius:50%; background:var(--accent); border:none;
    font-size:22px; color:#1B3A2F; flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .add-row button:active{transform:scale(0.94);}

  .toast{
    position:fixed; left:50%; bottom:calc(100px + var(--safe-bottom)); transform:translateX(-50%);
    background:var(--chalk); color:var(--board); padding:10px 18px; border-radius:999px;
    font-size:13px; font-weight:600; z-index:10; box-shadow:0 8px 24px rgba(0,0,0,0.3);
    animation:toastin 0.2s ease;
  }
  @keyframes toastin{from{opacity:0; transform:translate(-50%,8px);} to{opacity:1; transform:translate(-50%,0);}}

  .modal-overlay{
    position:fixed; inset:0; z-index:20;
    background:rgba(10,20,16,0.6);
    display:flex; align-items:flex-end; justify-content:center;
    animation:fadein 0.15s ease;
  }
  .modal-box{
    background:var(--board-2); border:1px solid var(--line);
    border-radius:20px 20px 0 0;
    padding:22px 20px calc(22px + var(--safe-bottom));
    width:100%; max-width:560px;
  }
  @media (min-width:600px){
    .modal-overlay{align-items:center;}
    .modal-box{border-radius:20px;}
  }

  .hidden{display:none !important;}
  .spinner{
    width:16px; height:16px; border-radius:50%;
    border:2px solid rgba(27,58,47,0.3); border-top-color:#1B3A2F;
    animation:spin 0.7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand">
      <h1>🛒 Lista del Súper</h1>
      <div class="sub" id="subLabel">sin conectar</div>
      <div class="version" id="versionLabel"></div>
    </div>
    <div class="who hidden" id="whoBox">
      <div class="avatar" id="avatarEl">D</div>
      <button class="icon-btn" id="refreshBtn" title="Actualizar">⟳</button>
      <button class="icon-btn" id="menuBtn" title="Opciones">⋮</button>
    </div>
  </header>

  <div class="sync-strip hidden" id="syncStrip">
    <span class="dot" id="syncDot"></span>
    <span id="syncText">Sincronizado</span>
  </div>

  <div class="tabs-row hidden" id="tabsRow">
    <button class="tab-btn active" id="tabComprar" data-view="comprar">Para comprar</button>
    <button class="tab-btn" id="tabCasa" data-view="casa">En casa</button>
  </div>

  <!-- GATE: login / configuración inicial -->
  <div class="gate" id="gate">
    <div class="mark">🛒</div>
    <h2 id="gateTitle">Cargando…</h2>
    <p id="gateText">Un segundo, estamos revisando tu sesión de Microsoft.</p>
    <div id="gateActions"></div>
  </div>

  <!-- LISTA -->
  <main class="hidden" id="main"></main>

  <div class="addbar hidden" id="addbar">
    <div class="cats-row" id="catsRow"></div>
    <div class="add-row">
      <input id="newItemInput" type="text" placeholder="Agregar producto…" autocomplete="off">
      <button id="addBtn">＋</button>
    </div>
  </div>

</div>

<!-- Modal para cambiar categoría -->
<div class="modal-overlay hidden" id="catModal">
  <div class="modal-box">
    <h3 style="margin-bottom:14px;">Cambiar categoría</h3>
    <div id="catModalChips" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;"></div>
    <button class="btn btn-ghost" id="catModalCloseBtn" style="width:100%; justify-content:center;">Cancelar</button>
  </div>
</div>

<!-- Modal de menú (⋮) -->
<div class="modal-overlay hidden" id="menuModal">
  <div class="modal-box">
    <h3 style="margin-bottom:16px;">Opciones</h3>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <button class="btn btn-primary" id="menuShareBtn" style="width:100%; justify-content:center;">Compartir lista con alguien</button>
      <button class="btn btn-danger" id="menuLogoutBtn" style="width:100%; justify-content:center; border:1px solid rgba(226,84,61,0.4);">Cerrar sesión en este dispositivo</button>
      <button class="btn btn-ghost" id="menuCloseBtn" style="width:100%; justify-content:center;">Cancelar</button>
    </div>
  </div>
</div>

<!-- Modal para compartir -->
<div class="modal-overlay hidden" id="shareModal">
  <div class="modal-box">
    <h3 style="margin-bottom:6px;">Compartir la lista</h3>
    <p id="shareModalIntro" style="color:var(--chalk-dim); font-size:13px; margin:0 0 14px;">Escribí el mail de la cuenta Microsoft de la persona. Va a poder ver y editar la lista.</p>
    <div id="shareModalForm">
      <label style="font-size:12px; color:var(--chalk-dim); font-family:'IBM Plex Mono', monospace; text-transform:uppercase; letter-spacing:0.06em;">Email de la cuenta Microsoft</label>
      <input id="shareModalEmail" type="email" placeholder="mari@outlook.com" style="width:100%; margin-top:6px; margin-bottom:14px; background:rgba(0,0,0,0.2); border:1px solid var(--line); color:var(--chalk); padding:11px 12px; border-radius:10px; font-size:15px; font-family:'Work Sans',sans-serif;">
      <div style="display:flex; flex-direction:column; gap:10px;">
        <button class="btn btn-primary" id="shareModalBtn" style="width:100%; justify-content:center;">Compartir acceso</button>
        <button class="btn btn-ghost" id="shareModalCloseBtn" style="width:100%; justify-content:center;">Cancelar</button>
      </div>
    </div>
    <div id="shareModalResult" class="hidden"></div>
  </div>
</div>

<script>
(() => {
  const CFG = window.APP_CONFIG;
  // Lista de categorías disponibles para etiquetar productos.
  const CATEGORIES = ["Almacén","Bebidas","Carnicería","Lácteos","Limpieza","Panadería","Verdulería","Otros"];
  let selectedCategory = "Otros";
  let currentView = 'comprar'; // 'comprar' | 'casa'
  let lastEtag = null;
  let currentItems = [];
  let saving = false;
  let pendingSave = false;

  // ---------- Detección de config incompleta ----------
  if (!CFG.CLIENT_ID || CFG.CLIENT_ID.includes("PEGA_AQUI")) {
    document.getElementById('gateTitle').textContent = "Falta un paso de configuración";
    document.getElementById('gateText').innerHTML = "Todavía no completaste el <b>CLIENT_ID</b> en index.html. Seguí el README.md para registrar la app en Microsoft (es gratis, tarda unos minutos).";
    document.getElementById('gate').classList.remove('hidden');
    return;
  }

  // ---------- MSAL ----------
  const msalConfig = {
    auth: {
      clientId: CFG.CLIENT_ID,
      authority: "https://login.microsoftonline.com/consumers",
      redirectUri: window.location.origin + window.location.pathname
    },
    cache: { cacheLocation: "localStorage", storeAuthStateInCookie: false }
  };
  const msalInstance = new msal.PublicClientApplication(msalConfig);
  const SCOPES = ["User.Read", "Files.ReadWrite"];

  let account = null;
  let role = localStorage.getItem('ls_role'); // 'owner' | 'guest' | null
  let guestDriveId = localStorage.getItem('ls_guestDriveId');
  let guestItemId = localStorage.getItem('ls_guestItemId');

  const els = {
    gate: document.getElementById('gate'),
    gateTitle: document.getElementById('gateTitle'),
    gateText: document.getElementById('gateText'),
    gateActions: document.getElementById('gateActions'),
    main: document.getElementById('main'),
    addbar: document.getElementById('addbar'),
    catsRow: document.getElementById('catsRow'),
    whoBox: document.getElementById('whoBox'),
    avatarEl: document.getElementById('avatarEl'),
    subLabel: document.getElementById('subLabel'),
    syncStrip: document.getElementById('syncStrip'),
    syncDot: document.getElementById('syncDot'),
    syncText: document.getElementById('syncText'),
    newItemInput: document.getElementById('newItemInput'),
    addBtn: document.getElementById('addBtn'),
    menuBtn: document.getElementById('menuBtn'),
    refreshBtn: document.getElementById('refreshBtn'),
    versionLabel: document.getElementById('versionLabel'),
    tabsRow: document.getElementById('tabsRow'),
    tabComprar: document.getElementById('tabComprar'),
    tabCasa: document.getElementById('tabCasa'),
  };
  els.versionLabel.textContent = `v${CFG.VERSION} · ${CFG.RELEASE_DATE}`;

  function showToast(msg){
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 2200);
  }

  function setSync(state, text){
    els.syncStrip.classList.remove('hidden');
    els.syncDot.className = 'dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
    els.syncText.textContent = text;
  }

  async function getToken(){
    try{
      const res = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account });
      return res.accessToken;
    }catch(e){
      const res = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
      account = res.account;
      return res.accessToken;
    }
  }

  async function graph(path, opts = {}){
    const token = await getToken();
    const res = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
      ...opts,
      headers: {
        Authorization: `Bearer ${token}`,
        ...(opts.headers || {})
      }
    });
    return res;
  }

  // ---------- Init ----------
  async function init(){
    await msalInstance.initialize();
    const redirectResult = await msalInstance.handleRedirectPromise().catch(()=>null);
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0){
      account = accounts[0];
      await afterLogin();
    } else {
      renderLoggedOutGate();
    }
  }

  function renderLoggedOutGate(){
    els.gateTitle.textContent = "La lista de compras de la familia";
    els.gateText.textContent = "Iniciá sesión con tu cuenta de Microsoft para ver y editar la lista compartida.";
    els.gateActions.innerHTML = '<button class="btn btn-primary" id="loginBtn">Iniciar sesión con Microsoft</button>';
    document.getElementById('loginBtn').onclick = doLogin;
  }

  async function doLogin(){
    try{
      const res = await msalInstance.loginPopup({ scopes: SCOPES });
      account = res.account;
      await afterLogin();
    }catch(e){
      showToast("No se pudo iniciar sesión");
      console.error(e);
    }
  }

  async function afterLogin(){
    els.whoBox.classList.remove('hidden');
    els.avatarEl.textContent = (account.name || account.username || "?").trim()[0].toUpperCase();
    els.subLabel.textContent = account.name || account.username;

    if (!role){
      // primera vez en este dispositivo: preguntamos el rol
      renderRoleChoice();
      return;
    }

    if (role === 'owner'){
      await ensureOwnerFile();
    } else {
      await ensureGuestFile();
    }
  }

  function renderRoleChoice(){
    els.gateTitle.textContent = "¿Cómo vas a usar la app?";
    els.gateText.textContent = "Elegí una opción. Solo se pregunta una vez por dispositivo.";
    els.gateActions.innerHTML = `
      <div style="display:flex; flex-direction:column; gap:10px; margin-top:6px;">
        <button class="btn btn-primary" id="ownerBtn">Soy quien creó la lista (dueño del archivo)</button>
        <button class="btn btn-ghost" id="guestBtn">Me compartieron la lista</button>
      </div>`;
    document.getElementById('ownerBtn').onclick = () => { role='owner'; localStorage.setItem('ls_role','owner'); ensureOwnerFile(); };
    document.getElementById('guestBtn').onclick = () => { role='guest'; localStorage.setItem('ls_role','guest'); ensureGuestFile(); };
  }

  // ---------- OWNER: crea/asegura carpeta y archivo ----------
  let ownerItemId = null;
  async function ensureOwnerFile(){
    els.gateTitle.textContent = "Preparando tu lista…";
    els.gateText.textContent = "";
    els.gateActions.innerHTML = '<div class="spinner" style="border-top-color:var(--chalk); border-color:rgba(244,239,225,0.25)"></div>';

    // 1) carpeta
    let folderRes = await graph(`/me/drive/root:/${CFG.FOLDER_NAME}`);
    if (folderRes.status === 404){
      await graph(`/me/drive/root/children`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name: CFG.FOLDER_NAME, folder: {}, "@microsoft.graph.conflictBehavior":"rename" })
      });
    }
    // 2) archivo
    let fileRes = await graph(`/me/drive/root:/${CFG.FOLDER_NAME}/${CFG.FILE_NAME}`);
    if (fileRes.status === 404){
      const createRes = await graph(`/me/drive/root:/${CFG.FOLDER_NAME}/${CFG.FILE_NAME}:/content`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ items: [] })
      });
      const data = await createRes.json();
      ownerItemId = data.id;
    } else if (fileRes.ok){
      const data = await fileRes.json();
      ownerItemId = data.id;
    } else {
      showFatal("No pudimos crear el archivo en OneDrive. Revisá los permisos en el README.");
      return;
    }

    // ¿ya la compartió con alguien?
    const shared = localStorage.getItem('ls_sharedDone');
    if (!shared){
      renderShareStep();
    } else {
      showApp();
      startPolling();
    }
  }

  function renderShareStep(){
    els.gateTitle.textContent = "Compartila con tu familia";
    els.gateText.textContent = "Escribí el mail de la cuenta Microsoft de la otra persona para darle acceso de edición.";
    els.gateActions.innerHTML = `
      <div class="setup-card">
        <label>Email de la cuenta Microsoft</label>
        <input id="shareEmail" type="email" placeholder="mari@outlook.com">
        <button class="btn btn-primary" id="shareBtn" style="width:100%; justify-content:center;">Compartir acceso</button>
        <div style="text-align:center; margin-top:10px;">
          <button class="btn-ghost" style="background:none;border:none;color:var(--chalk-dim);font-size:12px;cursor:pointer;" id="skipShare">Ya la compartí antes, continuar →</button>
        </div>
      </div>`;
    document.getElementById('shareBtn').onclick = doShare;
    document.getElementById('skipShare').onclick = () => { localStorage.setItem('ls_sharedDone','1'); showApp(); startPolling(); };
  }

  async function inviteEmail(email, itemId){
    const res = await graph(`/me/drive/items/${itemId}/invite`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        recipients: [{ email }],
        message: "Te comparto nuestra lista del súper 🛒",
        requireSignIn: true,
        sendInvitation: true,
        roles: ["write"]
      })
    });
    return res;
  }

  async function createShareLink(itemId){
    const res = await graph(`/me/drive/items/${itemId}/createLink`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ type: 'edit', scope: 'anonymous' })
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.link ? data.link.webUrl : null;
  }

  async function copyToClipboard(text){
    try{
      await navigator.clipboard.writeText(text);
      return true;
    }catch(e){
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try{ document.execCommand('copy'); ta.remove(); return true; }
      catch(e2){ ta.remove(); return false; }
    }
  }

  function shareLinkResultHtml(link){
    return `
      <div class="setup-card" style="margin-top:14px;">
        <label>Mandale este link por WhatsApp</label>
        <div style="background:rgba(0,0,0,0.25); border:1px solid var(--line); border-radius:10px; padding:11px 12px; font-size:12px; word-break:break-all; margin:6px 0 12px; font-family:'IBM Plex Mono',monospace; color:var(--chalk-dim);">${link}</div>
        <p style="font-size:12px; color:var(--chalk-dim); margin:0 0 12px;">La otra persona debe abrir la app (no el link directo) y pegarlo en «Me compartieron la lista».</p>
        <button class="btn btn-primary" id="copyLinkBtn" style="width:100%; justify-content:center;">Copiar link</button>
      </div>`;
  }

  async function doShare(){
    const email = document.getElementById('shareEmail').value.trim();
    if (!email){ showToast("Ingresá un email"); return; }
    const btn = document.getElementById('shareBtn');
    btn.disabled = true; btn.textContent = "Compartiendo…";
    try{
      const res = await inviteEmail(email, ownerItemId);
      if (res.ok){
        localStorage.setItem('ls_sharedDone','1');
        const link = await createShareLink(ownerItemId);
        if (link){
          els.gateTitle.textContent = "¡Compartido!";
          els.gateText.textContent = "Un último paso: mandale este link a la otra persona.";
          els.gateActions.innerHTML = shareLinkResultHtml(link) +
            `<button class="btn btn-ghost" id="continueAfterShareBtn" style="width:100%; justify-content:center; margin-top:10px;">Continuar a la lista →</button>`;
          document.getElementById('copyLinkBtn').onclick = async () => {
            const ok = await copyToClipboard(link);
            showToast(ok ? "Link copiado ✓" : "No se pudo copiar, seleccionalo a mano");
          };
          document.getElementById('continueAfterShareBtn').onclick = () => { showApp(); startPolling(); };
        } else {
          showToast("Compartido ✓");
          showApp();
          startPolling();
        }
      } else {
        const err = await res.json().catch(()=>({}));
        showToast("No se pudo compartir. Revisá el mail.");
        btn.disabled = false; btn.textContent = "Compartir acceso";
        console.error(err);
      }
    }catch(e){
      showToast("Error al compartir");
      btn.disabled = false; btn.textContent = "Compartir acceso";
    }
  }

  // ---------- GUEST: busca el archivo compartido ----------
  async function ensureGuestFile(){
    if (guestDriveId && guestItemId){
      showApp();
      startPolling();
      return;
    }
    els.gateTitle.textContent = "Buscando la lista compartida…";
    els.gateText.textContent = "";
    els.gateActions.innerHTML = '<div class="spinner" style="border-top-color:var(--chalk); border-color:rgba(244,239,225,0.25)"></div>';

    const res = await graph(`/me/drive/sharedWithMe`);
    if (!res.ok){ showFatal("No pudimos consultar OneDrive."); return; }
    const data = await res.json();
    const match = (data.value || []).find(it => it.name === CFG.FILE_NAME);

    if (match){
      guestDriveId = match.remoteItem.parentReference.driveId;
      guestItemId = match.remoteItem.id;
      localStorage.setItem('ls_guestDriveId', guestDriveId);
      localStorage.setItem('ls_guestItemId', guestItemId);
      showApp();
      startPolling();
    } else {
      renderManualLinkStep();
    }
  }

  function renderManualLinkStep(){
    els.gateTitle.textContent = "Pegá el link que te compartieron";
    els.gateText.textContent = "Quien creó la lista te tiene que haber pasado un link por WhatsApp (desde el botón «Compartir» de la app). Pegalo acá abajo. No hace falta abrirlo en el navegador, solo pegarlo en este campo.";
    els.gateActions.innerHTML = `
      <div class="setup-card">
        <label>Link que te compartieron</label>
        <input id="shareLink" type="text" placeholder="https://1drv.ms/... o https://onedrive.live.com/...">
        <button class="btn btn-primary" id="resolveLinkBtn" style="width:100%; justify-content:center; margin-bottom:8px;">Conectar con este link</button>
        <button class="btn btn-ghost" id="retryBtn" style="width:100%; justify-content:center;">Reintentar búsqueda automática</button>
      </div>`;
    document.getElementById('retryBtn').onclick = ensureGuestFile;
    document.getElementById('resolveLinkBtn').onclick = resolveShareLink;
  }

  async function resolveShareLink(){
    const link = document.getElementById('shareLink').value.trim();
    if (!link){ showToast("Pegá un link"); return; }
    const encoded = 'u!' + btoa(link).replace(/=+$/,'').replace(/\//g,'_').replace(/\+/g,'-');
    const res = await graph(`/shares/${encoded}/driveItem?$select=id,parentReference`);
    if (!res.ok){ showToast("El link no es válido"); return; }
    const data = await res.json();
    guestDriveId = data.parentReference.driveId;
    guestItemId = data.id;
    localStorage.setItem('ls_guestDriveId', guestDriveId);
    localStorage.setItem('ls_guestItemId', guestItemId);
    showToast("Conectado ✓");
    showApp();
    startPolling();
  }

  function showFatal(msg){
    els.gateTitle.textContent = "Algo salió mal";
    els.gateText.textContent = msg;
    els.gateActions.innerHTML = '<button class="btn btn-ghost" onclick="location.reload()">Reintentar</button>';
  }

  // ---------- Contenido: leer / escribir ----------
  function contentPath(){
    if (role === 'owner') return `/me/drive/items/${ownerItemId}/content`;
    return `/drives/${guestDriveId}/items/${guestItemId}/content`;
  }
  function metaPath(){
    if (role === 'owner') return `/me/drive/items/${ownerItemId}`;
    return `/drives/${guestDriveId}/items/${guestItemId}`;
  }

  async function loadItems(){
    setSync('syncing', 'Sincronizando…');
    try{
      const metaRes = await graph(metaPath() + '?$select=eTag,lastModifiedDateTime');
      const meta = await metaRes.json();
      const res = await graph(contentPath());
      if (!res.ok) throw new Error('read failed');
      const data = await res.json();
      currentItems = data.items || [];
      lastEtag = meta.eTag;
      render();
      setSync('ok', 'Sincronizado');
    }catch(e){
      console.error(e);
      setSync('error', 'No se pudo sincronizar');
    }
  }

  async function saveItems(){
    if (saving){ pendingSave = true; return; }
    saving = true;
    setSync('syncing', 'Guardando…');
    try{
      // merge sencillo: releer eTag actual; si cambió, traer remoto y unir por id
      const metaRes = await graph(metaPath() + '?$select=eTag');
      const meta = await metaRes.json();
      if (meta.eTag && lastEtag && meta.eTag !== lastEtag){
        const remoteRes = await graph(contentPath());
        const remoteData = await remoteRes.json();
        currentItems = mergeItems(remoteData.items || [], currentItems);
      }
      const putRes = await graph(contentPath(), {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ items: currentItems })
      });
      const putData = await putRes.json();
      lastEtag = putData.eTag;
      setSync('ok', 'Sincronizado');
    }catch(e){
      console.error(e);
      setSync('error', 'No se pudo guardar, reintentando…');
    }finally{
      saving = false;
      if (pendingSave){ pendingSave = false; saveItems(); }
    }
  }

  function mergeItems(remote, local){
    const byId = new Map();
    remote.forEach(it => byId.set(it.id, it));
    local.forEach(it => {
      const r = byId.get(it.id);
      if (!r) { byId.set(it.id, it); return; }
      const rTime = new Date(r.checkedAt || r.addedAt || 0).getTime();
      const lTime = new Date(it.checkedAt || it.addedAt || 0).getTime();
      byId.set(it.id, lTime >= rTime ? it : r);
    });
    return Array.from(byId.values());
  }

  function startPolling(){
    loadItems();
  }

  // ---------- UI ----------
  function showApp(){
    els.gate.classList.add('hidden');
    els.main.classList.remove('hidden');
    els.addbar.classList.remove('hidden');
    els.tabsRow.classList.remove('hidden');
    buildCatsRow();
  }

  function buildCatsRow(){
    els.catsRow.innerHTML = CATEGORIES.map(c =>
      `<button class="cat-chip${c===selectedCategory?' active':''}" data-cat="${c}">${c}</button>`
    ).join('');
    els.catsRow.querySelectorAll('.cat-chip').forEach(chip => {
      chip.onclick = () => {
        selectedCategory = chip.dataset.cat;
        buildCatsRow();
      };
    });
  }

  function render(){
    const pending = currentItems.filter(i => !i.checked);
    const done = currentItems.filter(i => i.checked);

    els.tabComprar.textContent = `Para comprar (${pending.length})`;
    els.tabCasa.textContent = `En casa (${done.length})`;

    if (currentItems.length === 0){
      els.main.innerHTML = `<div class="empty-state"><span class="mark">🧺</span>El catálogo está vacío.<br>Agregá los productos que compran habitualmente.</div>`;
      return;
    }

    const list = currentView === 'comprar' ? pending : done;

    if (list.length === 0){
      const msg = currentView === 'comprar'
        ? `<div class="empty-state"><span class="mark">✅</span>No hay nada pendiente por ahora.<br>Cuando se termine algo, marcalo en «En casa».</div>`
        : `<div class="empty-state"><span class="mark">🏠</span>Todavía no tenés nada marcado como "en casa".</div>`;
      els.main.innerHTML = msg;
      return;
    }

    const groups = {};
    list.forEach(it => {
      const c = it.category || 'Otros';
      (groups[c] = groups[c] || []).push(it);
    });

    let html = '';
    Object.keys(groups).sort((a,b) => a.localeCompare(b, 'es')).forEach(cat => {
      html += `<div class="cat-group"><div class="cat-title">${cat}</div>`;
      groups[cat]
        .sort((a,b) => a.name.localeCompare(b.name, 'es'))
        .forEach(it => { html += itemRowHtml(it); });
      html += `</div>`;
    });

    els.main.innerHTML = html;

    els.main.querySelectorAll('.check, .item-info').forEach(el => {
      el.onclick = () => toggleItem(el.closest('.item-row').dataset.id);
    });
    els.main.querySelectorAll('.item-del').forEach(el => {
      el.onclick = (e) => { e.stopPropagation(); deleteItem(el.dataset.id); };
    });
    els.main.querySelectorAll('.item-cat-btn').forEach(el => {
      el.onclick = (e) => { e.stopPropagation(); openCatModal(el.dataset.id); };
    });
  }

  function itemRowHtml(it){
    const who = it.addedBy ? it.addedBy.split(' ')[0] : '';
    return `<div class="item-row${it.checked?' done':''}" data-id="${it.id}">
      <div class="check${it.checked?' checked':''}">✓</div>
      <div class="item-info">
        <div class="item-name">${escapeHtml(it.name)}</div>
        <div class="item-meta">${who ? 'agregó ' + who : ''}</div>
      </div>
      <button class="item-cat-btn" data-id="${it.id}">${escapeHtml(it.category || 'Otros')}</button>
      <button class="item-del" data-id="${it.id}">✕</button>
    </div>`;
  }

  function escapeHtml(s){
    const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
  }

  function openCatModal(itemId){
    const chips = document.getElementById('catModalChips');
    chips.innerHTML = CATEGORIES.map(c => `<button class="cat-chip" data-cat="${c}">${c}</button>`).join('');
    chips.querySelectorAll('.cat-chip').forEach(chip => {
      chip.onclick = () => {
        setItemCategory(itemId, chip.dataset.cat);
        document.getElementById('catModal').classList.add('hidden');
      };
    });
    document.getElementById('catModal').classList.remove('hidden');
  }

  function setItemCategory(id, category){
    const it = currentItems.find(i => i.id === id);
    if (!it) return;
    it.category = category;
    render();
    saveItems();
  }

  function toggleItem(id){
    const it = currentItems.find(i => i.id === id);
    if (!it) return;
    it.checked = !it.checked;
    if (it.checked){ it.checkedAt = new Date().toISOString(); it.checkedBy = account.name || account.username; }
    render();
    saveItems();
  }

  function deleteItem(id){
    currentItems = currentItems.filter(i => i.id !== id);
    render();
    saveItems();
  }

  function addItem(){
    const name = els.newItemInput.value.trim();
    if (!name) return;
    currentItems.unshift({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random(),
      name,
      category: selectedCategory,
      checked: false,
      addedBy: account.name || account.username,
      addedAt: new Date().toISOString()
    });
    els.newItemInput.value = '';
    render();
    saveItems();
  }

  els.addBtn.addEventListener('click', addItem);
  els.newItemInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addItem(); });

  els.tabComprar.addEventListener('click', () => {
    currentView = 'comprar';
    els.tabComprar.classList.add('active');
    els.tabCasa.classList.remove('active');
    render();
  });
  els.tabCasa.addEventListener('click', () => {
    currentView = 'casa';
    els.tabCasa.classList.add('active');
    els.tabComprar.classList.remove('active');
    render();
  });
  document.getElementById('catModalCloseBtn').addEventListener('click', () => {
    document.getElementById('catModal').classList.add('hidden');
  });

  els.refreshBtn.addEventListener('click', async () => {
    els.refreshBtn.style.transition = 'transform 0.5s ease';
    els.refreshBtn.style.transform = 'rotate(360deg)';
    await loadItems();
    setTimeout(() => { els.refreshBtn.style.transform = 'rotate(0deg)'; }, 50);
  });

  els.menuBtn.addEventListener('click', () => {
    document.getElementById('menuShareBtn').classList.toggle('hidden', role !== 'owner');
    document.getElementById('menuModal').classList.remove('hidden');
  });
  document.getElementById('menuCloseBtn').addEventListener('click', () => {
    document.getElementById('menuModal').classList.add('hidden');
  });
  document.getElementById('menuLogoutBtn').addEventListener('click', () => {
    const doLogout = confirm("¿Cerrar sesión en este dispositivo?");
    if (doLogout){
      localStorage.clear();
      msalInstance.logoutPopup().catch(()=>location.reload());
    }
  });
  document.getElementById('menuShareBtn').addEventListener('click', () => {
    document.getElementById('menuModal').classList.add('hidden');
    document.getElementById('shareModalEmail').value = '';
    document.getElementById('shareModalForm').classList.remove('hidden');
    document.getElementById('shareModalIntro').classList.remove('hidden');
    document.getElementById('shareModalResult').classList.add('hidden');
    document.getElementById('shareModal').classList.remove('hidden');
  });
  document.getElementById('shareModalCloseBtn').addEventListener('click', () => {
    document.getElementById('shareModal').classList.add('hidden');
  });
  document.getElementById('shareModalBtn').addEventListener('click', async () => {
    const email = document.getElementById('shareModalEmail').value.trim();
    if (!email){ showToast("Ingresá un email"); return; }
    const btn = document.getElementById('shareModalBtn');
    btn.disabled = true; btn.textContent = "Compartiendo…";
    try{
      const res = await inviteEmail(email, ownerItemId);
      if (res.ok){
        const link = await createShareLink(ownerItemId);
        document.getElementById('shareModalForm').classList.add('hidden');
        document.getElementById('shareModalIntro').classList.add('hidden');
        const resultEl = document.getElementById('shareModalResult');
        if (link){
          resultEl.innerHTML = shareLinkResultHtml(link) +
            `<button class="btn btn-ghost" id="shareResultCloseBtn" style="width:100%; justify-content:center; margin-top:10px;">Cerrar</button>`;
          document.getElementById('copyLinkBtn').onclick = async () => {
            const ok = await copyToClipboard(link);
            showToast(ok ? "Link copiado ✓" : "No se pudo copiar, seleccionalo a mano");
          };
          document.getElementById('shareResultCloseBtn').onclick = () => {
            document.getElementById('shareModal').classList.add('hidden');
          };
        } else {
          resultEl.innerHTML = `<p>Se compartió con ${email}, pero no pudimos generar el link para copiar. Buscá el mail de invitación que le llegó.</p>
            <button class="btn btn-ghost" id="shareResultCloseBtn" style="width:100%; justify-content:center; margin-top:10px;">Cerrar</button>`;
          document.getElementById('shareResultCloseBtn').onclick = () => {
            document.getElementById('shareModal').classList.add('hidden');
          };
        }
        resultEl.classList.remove('hidden');
      } else {
        showToast("No se pudo compartir. Revisá el mail.");
      }
    }catch(e){
      showToast("Error al compartir");
    }finally{
      btn.disabled = false; btn.textContent = "Compartir acceso";
    }
  });

  // Registrar service worker
  if ('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }

  init();
})();
</script>
</body>
</html>
